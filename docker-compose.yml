services:
  web:
    image: nginx:alpine
    container_name: yrb4g-landing
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - contact-api

  contact-api:
    build: ./contact-api
    container_name: yrb4g-contact-api
    restart: unless-stopped
    env_file:
      - .env
