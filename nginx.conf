server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Disabilita directory listing (sicurezza)
    autoindex off;

    # Serve automaticamente index.html nelle cartelle
    index index.html;

    # Proxy per l'API di contatto
    location /api/ {
        proxy_pass http://contact-api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gestione URL puliti: prova file esatto, poi cartella, poi 404
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Nascondi file nascosti (.git, .env, ecc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Blocca accesso al backend e file di configurazione
    location ~ ^/(contact-api|docker-compose|nginx\.conf|Dockerfile) {
        deny all;
        return 404;
    }

    # Cache statica per performance
    location ~* \.(css|js|woff2|jpeg|jpg|png|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Header di sicurezza
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
