server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Disabilita directory listing (sicurezza)
    autoindex off;

    # Serve automaticamente index.html nelle cartelle
    index index.html;

    # Gestione URL puliti: prova file esatto, poi cartella, poi 404
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Nascondi file nascosti (.git, .env, ecc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Cache statica per performance
    location ~* \.(css|js|woff2|jpeg|jpg|png|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Header di sicurezza
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
