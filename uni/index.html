<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Hub | @gabrieleforghieri</title>
  <meta name="description" content="Appunti e risorse universitarie.">
  <link rel="stylesheet" href="css/uni-style.css">
</head>
<body>
  
  <header class="header">
    <a href="../" class="back-home-btn animate-fade-in">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      yrb4g.com
    </a>
    <h1 class="animate-fade-in">University Hub 🎓</h1>
    <p class="animate-fade-in" style="animation-delay: 0.1s;">Appunti, risorse e materiale didattico.</p>
  </header>

  <main class="container">
    <div class="course-grid">
      
      <!-- Card Sistemi Operativi -->
      <a href="sistemioperativi/" class="course-card animate-fade-in" style="animation-delay: 0.2s; align-items: center; text-align: center; padding: 2rem 1.5rem;">
        <div class="course-icon" style="font-size: 3.5rem; margin-bottom: 0.5rem; text-shadow: 0 4px 12px rgba(0,0,0,0.3);">💻</div>
        <h2 class="course-title" style="font-size: 1.4rem; margin-bottom: 1rem;">Sistemi Operativi</h2>
        <span style="background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);">Appunti</span>
      </a>

      <!-- Aggiungi altre card qui copiando il blocco sopra -->
      <!--
      <a href="reticalcolatori/" class="course-card animate-fade-in" style="animation-delay: 0.3s;">
        <div class="course-icon">🌐</div>
        <h2 class="course-title">Reti di Calcolatori</h2>
        <p class="course-desc">Appunti su ISO/OSI, TCP/IP, routing e protocolli applicativi.</p>
      </a>
      -->

    </div>
  </main>

  <script>
    const header = document.querySelector('.header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 30) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
