<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistemi Operativi | Uni Hub</title>
  <link rel="stylesheet" href="../css/uni-style.css">
</head>
<body>

  <header class="header">
    <a href="../" class="back-home-btn animate-fade-in">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Uni Hub
    </a>
    <h1 class="animate-fade-in">Sistemi Operativi 💻</h1>
    <p class="animate-fade-in" style="animation-delay: 0.1s;">Scegli la sezione che desideri consultare.</p>
  </header>

  <main class="container">
    <div class="course-grid">
      
      <!-- Appunti Completi -->
      <a href="appunti/" class="course-card animate-fade-in" style="animation-delay: 0.2s; align-items: center; text-align: center; padding: 2rem 1.5rem;">
        <div class="course-icon" style="font-size: 3.5rem; margin-bottom: 0.5rem; text-shadow: 0 4px 12px rgba(0,0,0,0.3);">📝</div>
        <h2 class="course-title" style="font-size: 1.4rem; margin-bottom: 0.5rem;">Appunti Completi</h2>
        <p class="course-desc" style="margin-bottom: 1rem;">Documento Google completo con tutti gli appunti del corso.</p>
        <span style="background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Sola Lettura</span>
      </a>

      <!-- Materiale Esame -->
      <a href="materiale/" class="course-card animate-fade-in" style="animation-delay: 0.3s; align-items: center; text-align: center; padding: 2rem 1.5rem;">
        <div class="course-icon" style="font-size: 3.5rem; margin-bottom: 0.5rem; text-shadow: 0 4px 12px rgba(0,0,0,0.3);">⚡</div>
        <h2 class="course-title" style="font-size: 1.4rem; margin-bottom: 0.5rem;">Materiale Esame</h2>
        <p class="course-desc" style="margin-bottom: 1rem;">Spiegazioni veloci, riassunti e codici pronti per il ripasso.</p>
        <span style="background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Studio Veloce</span>
      </a>

    </div>
  </main>

  <script>
    const header = document.querySelector('.header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 30) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
