<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Apartments - Karlskrona</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f4f8;
            --text-muted: #8b9bb4;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --sbs-color: #10b981;
            --kh-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Background ambient glow */
        .ambient-light {
            position: fixed;
            top: -20%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
            animation: float 10s ease-in-out infinite alternate;
        }
        
        .ambient-light.two {
            top: auto;
            bottom: -20%;
            left: auto;
            right: -10%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, transparent 70%);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 4rem 2rem 2rem;
            text-align: center;
            animation: fadeDown 0.8s ease-out;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #8b9bb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 50px;
            font-size: 0.875rem;
            color: var(--sbs-color);
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--sbs-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--sbs-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        main {
            width: 100%;
            max-width: 1200px;
            padding: 0 2rem 4rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .apartment-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s forwards ease-out;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .apartment-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--card-border);
            transition: transform 0.5s ease;
        }

        .apartment-card:hover .card-img {
            transform: scale(1.05);
        }

        .img-container {
            overflow: hidden;
            position: relative;
        }

        .source-tag {
            position: absolute;
            top: 1rem;
            left: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .source-sbs {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .source-kh {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .card-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .card-details {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .card-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-view {
            color: var(--text-main);
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s;
        }
        
        .apartment-card:hover .btn-view {
            color: var(--accent);
        }
        
        .btn-view svg {
            transition: transform 0.3s;
        }
        
        .apartment-card:hover .btn-view svg {
            transform: translateX(5px);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card-bg);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 20px;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            color: var(--text-muted);
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .loader {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            padding: 4rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            main { grid-template-columns: 1fr; padding: 0 1.5rem 3rem; }
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div class="ambient-light two"></div>

    <header>
        <div class="status-badge" id="statusBadge">
            <div class="status-dot"></div>
            <span id="lastUpdated">Checking for updates...</span>
        </div>
        <h1>Karlskrona Student Housing</h1>
        <p class="subtitle">Curated listings < 5000kr near BTH, available for autumn</p>
    </header>

    <main id="listingsContainer">
        <div class="loader">
            <div class="spinner"></div>
        </div>
    </main>

    <script>
        async function fetchApartments() {
            try {
                // Add timestamp to prevent caching
                const response = await fetch(`data.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                renderApartments(data);
            } catch (error) {
                console.error('Error loading apartments:', error);
                document.getElementById('listingsContainer').innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <h2>Oops, couldn't load data.</h2>
                        <p class="subtitle" style="margin-top: 1rem; margin-bottom: 0;">The scraper might still be running its first batch or there is an error.</p>
                    </div>
                `;
            }
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderApartments(data) {
            const container = document.getElementById('listingsContainer');
            const statusEl = document.getElementById('lastUpdated');
            
            statusEl.textContent = `Live \u2022 Last updated at ${formatTime(data.last_updated)}`;
            
            if (!data.apartments || data.apartments.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <h2>No apartments available right now</h2>
                        <p class="subtitle" style="margin-top: 1rem; margin-bottom: 0;">Check back later. The system monitors automatically every day.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            
            data.apartments.forEach((apt, index) => {
                const sourceClass = apt.source === 'SBS' ? 'source-sbs' : 'source-kh';
                const formattedPrice = apt.price.toLocaleString('sv-SE') + ' kr/mån';
                
                // Truncate details for cleaner UI
                const shortDetails = apt.details.length > 120 
                    ? apt.details.substring(0, 120) + '...' 
                    : apt.details;

                const delay = index * 0.1;

                const html = `
                    <a href="${apt.url}" target="_blank" class="apartment-card" style="animation-delay: ${delay}s">
                        <div class="img-container">
                            <span class="source-tag ${sourceClass}">${apt.source}</span>
                            <img src="${apt.image}" alt="Apartment preview" class="card-img" loading="lazy">
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${apt.title}</h3>
                            <div class="card-price">${formattedPrice}</div>
                            <div class="card-details">${shortDetails}</div>
                            <div class="card-footer">
                                <span class="btn-view">
                                    View details
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                                </span>
                            </div>
                        </div>
                    </a>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', fetchApartments);
    </script>
</body>
</html>
