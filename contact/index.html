<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contattami | @gabrieleforghieri</title>
  <meta name="description" content="Invia un messaggio a Gabriele Forghieri.">
  <link rel="stylesheet" href="../uni/css/uni-style.css">
  <style>
    .contact-container {
      max-width: 560px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 3rem;
      flex: 1;
      width: 100%;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .form-textarea {
      min-height: 150px;
      resize: vertical;
    }

    .submit-btn {
      padding: 0.875rem 2rem;
      background: var(--accent-color);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 0.5rem;
    }

    .submit-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Status messages */
    .form-status {
      text-align: center;
      padding: 1rem;
      border-radius: 12px;
      font-weight: 500;
      display: none;
    }

    .form-status.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .form-status.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    @media (max-width: 639px) {
      .contact-container {
        padding: 1.5rem 1rem 2rem;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="../" class="back-home-btn animate-fade-in">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      yrb4g.com
    </a>
    <h1 class="animate-fade-in">Contattami ✉️</h1>
    <p class="animate-fade-in" style="animation-delay: 0.1s;">Inviami un messaggio, ti risponderò il prima possibile.</p>
  </header>

  <main class="contact-container">
    <form class="contact-form" id="contact-form">
      <div class="form-group animate-fade-in" style="animation-delay: 0.15s;">
        <label class="form-label" for="name">Nome</label>
        <input class="form-input" type="text" id="name" name="name" placeholder="Il tuo nome" required>
      </div>

      <div class="form-group animate-fade-in" style="animation-delay: 0.2s;">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="La tua email" required>
      </div>

      <div class="form-group animate-fade-in" style="animation-delay: 0.25s;">
        <label class="form-label" for="message">Messaggio</label>
        <textarea class="form-textarea" id="message" name="message" placeholder="Scrivi il tuo messaggio..." required></textarea>
      </div>

      <button type="submit" class="submit-btn animate-fade-in" style="animation-delay: 0.3s;" id="submit-btn">
        Invia Messaggio
      </button>

      <div class="form-status" id="form-status"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById('contact-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusEl = document.getElementById('form-status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Invio in corso...';
      statusEl.className = 'form-status';
      statusEl.style.display = 'none';

      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value,
      };

      try {
        const res = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (res.ok) {
          statusEl.className = 'form-status success';
          statusEl.textContent = '✅ Messaggio inviato con successo! Ti risponderò presto.';
          statusEl.style.display = 'block';
          form.reset();
        } else {
          throw new Error('Errore server');
        }
      } catch (err) {
        statusEl.className = 'form-status error';
        statusEl.textContent = '❌ Errore nell\'invio. Riprova più tardi.';
        statusEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Invia Messaggio';
      }
    });
  </script>

</body>
</html>
